version: "1"
runtime: dummy
roles:
    - triage
    - coder
    - review
    - fix
    - retro
    - prioritize
agents:
    - name: issue-ping
      source: harness/issue-ping.yaml
    - name: pr-ping
      source: harness/pr-ping.yaml
    - name: review-ping
      source: harness/review-ping.yaml
    - name: fork-pr-ping
      source: harness/fork-pr-ping.yaml
    - name: fork-pr-sync
      source: harness/fork-pr-sync.yaml
    - name: url-ping
      source: https://raw.githubusercontent.com/halfsend-05/url-harness-host/main/harness/url-ping.yaml#sha256=8c36fd364d31913862e4235bc48f739b106a6123cd0295dd4b9505eb72b4cc1b
