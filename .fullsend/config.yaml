      source: harness/local-ping.yaml
    - name: url-mixed
      source: https://raw.githubusercontent.com/halfsend-05/url-harness-host/main/harness/url-mixed.yaml#sha256=74ec8c7134bd54f52b8ad4454eba8ac6762dc7629634515179ade6a938acdf03
